services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: artifacts/api-server/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/app
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: replace-me-access
      JWT_REFRESH_SECRET: replace-me-refresh
      CORS_ORIGIN: "*"
      LOG_LEVEL: info
      RATE_LIMIT_MAX: 100
      RATE_LIMIT_WINDOW_MS: 60000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../..
      dockerfile: artifacts/exam-platform/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data: